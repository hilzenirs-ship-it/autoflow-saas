version: '3.8'

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_REQUIRED=${OPENAI_REQUIRED:-False}
      - DATABASE_PATH=database/hilflow.db
      - DEBUG=False
      - FLASK_ENV=production
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379/0
      - RATELIMIT_STORAGE_URI=redis://redis:6379/0
      - CACHE_REDIS_URL=redis://redis:6379/0
      - SESSION_COOKIE_SECURE=True
      - META_APP_SECRET=${META_APP_SECRET}
      - META_WEBHOOKS_REQUIRED=${META_WEBHOOKS_REQUIRED:-False}
      - META_GRAPH_BASE_URL=https://graph.facebook.com
      - META_GRAPH_VERSION=v19.0
      - MERCADO_PAGO_WEBHOOK_SECRET=${MERCADO_PAGO_WEBHOOK_SECRET}
      - MERCADO_PAGO_API_KEY=${MERCADO_PAGO_API_KEY}
      - MERCADO_PAGO_REQUIRED=${MERCADO_PAGO_REQUIRED:-True}
      - MERCADO_PAGO_API_BASE_URL=https://api.mercadopago.com
    volumes:
      - ./database:/app/database
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
